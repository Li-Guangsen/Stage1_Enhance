runtime:
  formal_enhancement_eval_env:
    scope: "Formal enhancement and protocol-v2 evaluation only."
    conda_root: 'D:\miniconda3'
    env_path: 'D:\Desktop\EdgeDetection\my_env'
    activate_cmd: 'cmd.exe /K "D:\miniconda3\Scripts\activate.bat D:\Desktop\EdgeDetection\my_env"'
    note: "This is the public environment contract for the current formal enhancement/evaluation workflow, not a blanket claim about every historical script or figure utility in the repository."

experiments:
  proxy_metric: "Weighted comprehensive score from metrics/score_protocol_v2.py on the full 506-image Original dataset, interpreted with MS-SSIM/PSNR as structure-preservation references because the paper target is edge/structure extraction rather than PSNR-only restoration."
  baseline_value: 0.0
  best_value: 11.3829
  total_runs: 58
  trajectory:
    - experiment_id: "optimization_v1_c00"
      hypothesis: "H3/H2"
      metric_value: 0.0
      baseline: 0.0
      delta: "+0.0000"
      change_summary: "Current default fusion plus homomorphic refinement, evaluated as the search reference."
    - experiment_id: "optimization_v1_c25"
      hypothesis: "H3/H2"
      metric_value: 10.1240
      baseline: 0.0
      delta: "+10.1240"
      change_summary: "RGHS-biased fusion plus mild homomorphic-entropy refinement; selected as balanced pilot winner with Mean_MS_SSIM >= 0.85."
    - experiment_id: "optimization_v1_full506_r4_03"
      hypothesis: "H3/H2"
      metric_value: 11.3829
      baseline: 0.0
      delta: "+11.3829 vs full506 c25"
      change_summary: "Default fusion plus stronger homomorphic-entropy refinement (gamma_low=0.5, gamma_high=2.1, cutoff_freq=48); selected as the current full506 comprehensive-metric winner."

evaluation:
  locked_full_dataset:
    id: "full502-clean-v1"
    manifest: "metrics/manifests/full502_clean_v1.txt"
    count: 502
    source_original_dir: "data/inputImg/Original"
    current_best_dir: "experiments/h2-full506-direct/outputs/full506/runs/full506_final_mainline"
    current_best_config: "experiments/optimization_v1/configs/locked_full506_final_mainline.json"
    stage_progress_output: "metrics/outputs/evaluate_protocol_v2/official_stage_progress_full502"
    rationale: "This is the formal clean stage-progress dataset. It is derived from the cleaned Original directory after removing the four diagnostic SIFT artifacts from the official result copy."
  formal_compare_dataset:
    id: "compare9-complete496-v1"
    manifest: "metrics/manifests/compare9_complete496_v1.txt"
    count: 496
    compared_methods:
      - "Ours"
      - "HVDualformer"
      - "ABC-Former"
      - "GDCP"
      - "CBF"
      - "HLRP"
      - "SGUIE-Net"
      - "Histoformer"
      - "WWPF"
    final_compare_output: "metrics/outputs/evaluate_protocol_v2/official_compare9_complete496"
    rationale: "This is the formal paper-table dataset. It uses the complete-case intersection across the accepted mainline and all eight external baselines."
    rerun_dependency_note: "The formal compare output is directly readable from the current workspace, but regenerating it still depends on machine-local absolute result directories for the eight external baselines listed in metrics/configs/official_method_registry.json."
    analysis_strategy:
      - "Keep WWPF in the paper main table as an aggressive but acceptable strong baseline; do not drop it merely because some no-reference metrics exceed Ours."
      - "Keep HLRP and Histoformer in the formal numeric table, but treat them as failure-case or supplementary qualitative discussion in the paper body because current microscopy outputs show strong distortion, color shift, and noise amplification."
      - "Interpret MS_SSIM and PSNR as structure-consistency references to the original image, not as enhancement-GT quality scores."
      - "Write all negative conclusions with an explicit HAB-microscopy scope; these observations describe task-specific adaptation under the current protocol, not a general invalidation of the original methods."
  planned_downstream_handoff_contract:
    status: planned
    note: "This is the target interface for future downstream edge validation, not an existing result."
    input_original_dir: "data/inputImg/Original"
    input_enhanced_dir: "experiments/h2-full506-direct/outputs/full506/runs/full506_final_mainline/png/Final"
    manifest: "metrics/manifests/full502_clean_v1.txt"
    recommended_output_dir: "metrics/outputs/downstream_edge_validation/official_full502_mainline"
    minimum_artifacts:
      - "summary.md or summary.csv"
      - "per_image_metrics.csv"
      - "manifest copy or explicit manifest reference"
      - "method note describing Original vs Ours Final"
  locked_subset:
    id: "pilot92-v1"
    manifest: "data/eval_subset_pilot92_v1.txt"
    count: 92
    source_original_dir: "data/inputImg/Original"
    source_eval_dir: "results/png/Final"
    rationale: "This is the current fully produced intersection and is sufficient for the first controlled ablation cycle."
  primary_metrics:
    - "Mean_MS_SSIM"
    - "Mean_PSNR"
    - "Mean_AvgGra"
  secondary_metrics:
    - "Mean_Contrast"
    - "Mean_EME"
    - "Mean_EMEE"
    - "Mean_UCIQE"
    - "Mean_UIQM"
    - "Mean_PSNR"
    - "Mean_Entropy"
  decision_rules:
    - "Treat H1 as positive only if the candidate improves or effectively preserves MS_SSIM and PSNR while remaining visually stable under manual inspection."
    - "Treat H2 as positive only if the candidate improves the current structural references (especially MS_SSIM and PSNR) without introducing unacceptable visual rollback; future Fusion reopening should treat UCIQE/UIQM degradation as a hard or near-hard guardrail."
    - "Treat H3 as positive only if it adds illumination/readability improvement beyond the fused image and remains a secondary refinement, not the primary gain source."
    - "In paper writing, treat MS_SSIM and PSNR as original-reference structure-consistency metrics; high values indicate conservative similarity, not necessarily stronger enhancement."
  provisional_baseline:
    source: "metrics/archive/legacy_txt/our.txt"
    note: "Legacy 92-image JPG summary archived for reference only. It is no longer part of the formal paper workflow."
    mean_sift_kp: 2102.2283
    mean_avggra: 10.8460
    mean_ms_ssim: 0.8839
    mean_uiqm: 18.9340
    mean_uciqe: 4.3491

