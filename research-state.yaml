project:
  title: "HAB Microscopic Image Enhancement and Edge-Detection-Oriented Validation"
  question: "How can we improve underwater harmful algal bloom microscopic image enhancement so that color recovery, fine texture visibility, and downstream edge extractability all improve in a measurable and publishable way?"
  status: active
  started: "2026-04-11"
  domain: "underwater microscopic image enhancement and edge-oriented computer vision"

literature:
  key_papers:
    - id: "fan2025_awbcc_ipf_hdenet"
      title: "Innovative underwater image enhancement algorithm: Combined application of adaptive white balance color compensation and pyramid image fusion to submarine algal microscopy"
      authors: "Fan et al."
      year: 2025
      relevance: "Closest reference for enhancement pipeline organization, ablation design, and enhancement-to-edge-detection validation."
    - id: "wu2023_cyclic_cc_multiscale_fusion"
      title: "Underwater enhancement computing of ocean HABs based on cyclic color compensation and multi-scale fusion"
      authors: "Wu et al."
      year: 2023
      relevance: "Earlier enhancement-only reference using cyclic color compensation and three-image multi-scale fusion."
    - id: "wu2023_emd_wavelet_fusion"
      title: "Numerical computation of ocean HABs image enhancement based on empirical mode decomposition and wavelet fusion"
      authors: "Wu et al."
      year: 2023
      relevance: "Useful precursor for decomposition-driven enhancement and a direct literature anchor for the repository's IMF1/EMD branch."
    - id: "frontiers2024_hab_edge_detection"
      title: "Enhanced edge detection of harmful algal Blooms using diffusion probability models and Sobel-convolutional attention mechanisms"
      authors: "Frontiers Marine Science article"
      year: 2024
      relevance: "Relevant downstream reference showing that HAB microscopy enhancement and edge-sensitive processing can be argued as a unified application line."
  open_problems:
    - "Current references validate downstream edge extraction, but the exact enhancement design in this project already differs from the published AWBCC/IPF and cyclic fusion formulations."
    - "Existing metrics in the repository were computed on inconsistent sample subsets and currently cannot serve as the final paper table without standardization."
    - "The best paper framing must separate the mature enhancement contribution from any future edge-detection-network contribution."
  evidence_gaps:
    - "Need stronger downstream edge-validation evidence on enhanced vs non-enhanced images."
    - "Need a cleaner project-level summary that separates accepted mainline assets from intermediate search artifacts."
    - "Need explicit visual guardrails if Fusion is reopened, because the current accepted winner improves structure metrics while rolling back UCIQE/UIQM."

hypotheses:
  - id: H1
    statement: "Gray-pixel-guided pre-white-balance plus clipped ACCC yields more stable color recovery and better downstream edge extractability than plain cyclic compensation."
    status: accepted_mainline
    motivation: "The current lgsbph implementation already departs from the published ACCC design and appears to be one of the project's most defensible task-specific modifications."
    parent: null
    priority: high
  - id: H2
    statement: "The three-branch IMF1Ray/RGHS/CLAHE feature-gated fusion produces better edge-visible enhancement than any single branch or naive equal-weight fusion."
    status: accepted_with_visual_tradeoff
    motivation: "The fusion module is the strongest code-level innovation in the current repository and is the most likely source of publishable differentiation."
    parent: null
    priority: high
  - id: H3
    statement: "L-channel homomorphic refinement improves illumination uniformity and final edge readability, but should be treated as a refinement module rather than the main innovation."
    status: accepted_secondary_refinement
    motivation: "This stage is likely useful, but its scientific role must be demonstrated with ablation rather than over-claimed."
    parent: null
    priority: medium

