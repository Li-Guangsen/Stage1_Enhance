project:
  title: "HAB Microscopic Image Enhancement and Edge-Detection-Oriented Validation"
  question: "How can we improve underwater harmful algal bloom microscopic image enhancement so that color recovery, fine texture visibility, and downstream edge extractability all improve in a measurable and publishable way?"
  status: active
  started: "2026-04-11"
  domain: "underwater microscopic image enhancement and edge-oriented computer vision"
  writing_language_priority: "Chinese-first for the current paper-writing and evidence-alignment phase; English outlines and supporting drafts are kept as auxiliary assets."

experiment_governance:
  updated: "2026-05-26"
  status: "governance_layer_added_stop_new_candidates"
  current_priority: "experiment governance and candidate archival before any new Pxx/Dxx candidate"
  stop_state: "do not create new candidates without method design, run sheet, isolated output root, config, logs, status, decision, and registry entries"
  d01_boundary: "d01_structure_flow_v1 is a mechanism-complete weak diagnostic candidate; it is not a strong result, formal mainline, stable downstream gain, or completed goal"
  non_completion_gate_results:
    - "candidate_rescues_legacy_but_not_near_raw"
    - "candidate_metric_near_raw_structure_mixed"
    - "mechanism-complete weak candidate"
    - "proxy-only"
    - "readiness-only"
  validation_roles:
    myedge168_gt_split: "core fixed-detector downstream validation"
    full502_clean_v1: "Stage1 enhancement metrics and legacy formal small-scope assets only"
    compare9_complete496_v1: "external-method complete-case enhancement comparison only"
    full2770_pool: "engineering/qualitative full-pool extension only after readiness and clean protocol; not a substitute for downstream validation"
  governance_docs:
    - "AGENTS.md"
    - "experiments/AGENTS.override.md"
    - "docs/current_experiment_status_cn.md"
    - "docs/goal_design_contract_cn.md"
    - "docs/experiment_run_sheet_template_cn.md"
    - "docs/candidate_lifecycle_policy_cn.md"
    - "docs/experiment_stop_rules_cn.md"
    - "docs/stage1_to_myedge_downstream_workflow_cn.md"
    - "docs/evidence_asset_inventory_cn.md"
    - "docs/command_environment_rules_cn.md"
    - "docs/codex_instruction_verification_cn.md"
    - "metrics/registry_schema_cn.md"
  registries:
    registry_schema: "metrics/registry_schema_cn.md"
    experiment_registry: "metrics/experiment_registry.csv"
    candidate_registry: "metrics/candidate_registry.csv"

literature:
  key_papers:
    - id: "fan2025_awbcc_ipf_hdenet"
      title: "Innovative underwater image enhancement algorithm: Combined application of adaptive white balance color compensation and pyramid image fusion to submarine algal microscopy"
      authors: "Fan et al."
      year: 2025
      relevance: "Closest reference for enhancement pipeline organization, ablation design, and enhancement-to-edge-detection validation."
    - id: "wu2023_cyclic_cc_multiscale_fusion"
      title: "Underwater enhancement computing of ocean HABs based on cyclic color compensation and multi-scale fusion"
      authors: "Wu et al."
      year: 2023
      relevance: "Earlier enhancement-only reference using cyclic color compensation and three-image multi-scale fusion."
    - id: "wu2023_emd_wavelet_fusion"
      title: "Numerical computation of ocean HABs image enhancement based on empirical mode decomposition and wavelet fusion"
      authors: "Wu et al."
      year: 2023
      relevance: "Useful precursor for decomposition-driven enhancement and a direct literature anchor for the repository's IMF1/EMD branch."
    - id: "wu2026_eswa_hab_edge_detection"
      title: "Enhanced edge detection of harmful algal Blooms using diffusion probability models and Sobel-convolutional attention mechanisms"
      authors: "Wu et al."
      year: 2026
      venue: "Expert Systems with Applications 298:129663"
      doi: "10.1016/j.eswa.2025.129663"
      zotero_keys:
        - "9MCJDQGE"
        - "AKGYHG77"
      local_note: "literature/wu2026_eswa_hab_edge_detection.md"
      relevance: "Core same-direction ESWA HAB edge-detection reference. It shows that HAB enhancement plus diffusion edge detection is already covered, so Stage1 should be framed as task-driven structure-preserving input formation and any MyEdge paper must distinguish itself through MSFI/spatial-frequency weak-boundary diffusion rather than a generic enhancement-plus-edge pipeline."
    - id: "wu2026_eaai_hab_segmentation"
      title: "Microscopic image segmentation of harmful algal blooms using pyramid fusion enhancement and dual-branch network"
      authors: "Wu et al."
      year: 2026
      venue: "Engineering Applications of Artificial Intelligence 177:114948"
      doi: "10.1016/j.engappai.2026.114948"
      zotero_keys:
        - "ZMUBCGCD"
      local_note: "literature/wu2026_eaai_hab_segmentation.md"
      relevance: "Core same-direction EAAI HAB segmentation reference. It already covers task-oriented enhancement plus downstream boundary-sensitive segmentation, so this project must provide edge-specific downstream evidence instead of relying on generic task-driven enhancement claims."
